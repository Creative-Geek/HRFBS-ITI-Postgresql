{% extends "base.html" %} {% block title %}Payment — HRFBS{% endblock %} {%
block content %}

<div class="mb-8">
    <h1 class="text-2xl font-bold text-gray-900">Complete your payment</h1>
    <p class="text-gray-400 text-sm mt-1">
        Your booking is reserved — finish payment to confirm.
    </p>
</div>

<div class="max-w-md mx-auto">
    <div
        class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm flex flex-col gap-6"
    >
        <!-- amount summary -->
        <div
            class="flex justify-between items-center border-b border-gray-100 pb-5"
        >
            <div>
                <p class="text-gray-400 text-sm">Total due</p>
                <p
                    class="text-gray-400 text-xs mt-0.5 capitalize flex items-center gap-1"
                >
                    <i data-lucide="hash" class="w-3 h-3"></i>
                    {{ type }} booking #{{ booking_id }}
                </p>
            </div>
            <span class="text-blue-600 font-bold text-3xl">
                ${{ "%.2f"|format(amount) }}
            </span>
        </div>

        <!-- payment form -->
        <form action="/pay" method="post" class="flex flex-col gap-5">
            <input type="hidden" name="booking_type" value="{{ type }}" />
            <input type="hidden" name="booking_id" value="{{ booking_id }}" />
            <input type="hidden" name="amount" value="{{ amount }}" />

            <div>
                <label class="block text-sm text-gray-500 mb-3">
                    Payment method
                </label>
                <div class="flex flex-col gap-2">
                    <label class="cursor-pointer">
                        <input
                            type="radio"
                            name="method"
                            value="credit_card"
                            required
                            class="peer hidden"
                        />
                        <div
                            class="flex items-center gap-3 px-4 py-3 rounded-xl border border-gray-200 peer-checked:border-blue-400 peer-checked:bg-blue-50 hover:border-gray-300 transition"
                        >
                            <i
                                data-lucide="credit-card"
                                class="w-5 h-5 text-gray-400 peer-checked:text-blue-500"
                            ></i>
                            <span class="text-gray-700 text-sm font-medium"
                                >Credit Card</span
                            >
                        </div>
                    </label>

                    <label class="cursor-pointer">
                        <input
                            type="radio"
                            name="method"
                            value="online"
                            class="peer hidden"
                        />
                        <div
                            class="flex items-center gap-3 px-4 py-3 rounded-xl border border-gray-200 peer-checked:border-blue-400 peer-checked:bg-blue-50 hover:border-gray-300 transition"
                        >
                            <i
                                data-lucide="globe"
                                class="w-5 h-5 text-gray-400"
                            ></i>
                            <span class="text-gray-700 text-sm font-medium"
                                >Online Transfer</span
                            >
                        </div>
                    </label>

                    <label class="cursor-pointer">
                        <input
                            type="radio"
                            name="method"
                            value="cash"
                            class="peer hidden"
                        />
                        <div
                            class="flex items-center gap-3 px-4 py-3 rounded-xl border border-gray-200 peer-checked:border-blue-400 peer-checked:bg-blue-50 hover:border-gray-300 transition"
                        >
                            <i
                                data-lucide="banknote"
                                class="w-5 h-5 text-gray-400"
                            ></i>
                            <span class="text-gray-700 text-sm font-medium"
                                >Cash</span
                            >
                        </div>
                    </label>
                </div>
            </div>

            <button
                type="submit"
                class="w-full flex items-center justify-center gap-2 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-xl transition"
            >
                <i data-lucide="lock" class="w-4 h-4"></i>
                Pay ${{ "%.2f"|format(amount) }}
            </button>
        </form>
    </div>
</div>

{% endblock %}
