<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}HRFBS{% endblock %}</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <style>
            body {
                font-family: "Inter", system-ui, sans-serif;
            }
        </style>
    </head>
    <body class="bg-blue-50 text-gray-800 min-h-screen">
        <nav class="bg-white border-b border-gray-200 px-6 py-3 shadow-sm">
            <div class="max-w-5xl mx-auto flex justify-between items-center">
                <a href="/" class="flex items-center">
                    <img
                        src="/static/logo.png"
                        alt="HRFBS"
                        class="h-8 w-auto"
                    />
                </a>
                <a
                    href="/bookings"
                    class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-blue-600 transition"
                >
                    <i data-lucide="layout-list" class="w-4 h-4"></i>
                    My Bookings
                </a>
            </div>
        </nav>

        <div class="max-w-5xl mx-auto px-6 pt-5">
            {% if msg %}
            <div
                class="mb-4 flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm"
            >
                <i data-lucide="check-circle" class="w-4 h-4 shrink-0"></i>
                {{ msg }}
            </div>
            {% endif %} {% if error %}
            <div
                class="mb-4 flex items-center gap-2 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm"
            >
                <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
                {{ error }}
            </div>
            {% endif %}
        </div>

        <main class="max-w-5xl mx-auto px-6 py-8">
            {% block content %}{% endblock %}
        </main>

        <script>
            lucide.createIcons();
        </script>
    </body>
</html>
